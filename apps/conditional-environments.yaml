apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fermentation-station-agent-conditional-environments
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/lukasb27/fermentation-station-agent.git
    targetRevision: conditional-environments
    path: k8s
    kustomize:
      images:
        - lukasball/fermentation-station-agent=lukasball/fermentation-station-agent:conditional-environments
      commonAnnotations:
        prNumber: ""
        sha: df567dd58036124e7a1919d40916f8a92d7c2c43
  destination:
    server: https://kubernetes.default.svc
    namespace: conditional-environments
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true